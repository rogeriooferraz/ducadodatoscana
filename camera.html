<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Câmera Ao Vivo | Condomínio Ducado da Toscana</title>
    <meta name="description" content="Visualização em tela inteira das câmeras do Condomínio Ducado da Toscana.">
    <meta name="robots" content="noindex,nofollow">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <link rel="stylesheet" href="camera.css">
</head>
<body>
    <main class="player-shell">
        <section class="player-stage">
            <div class="player-loading-card" id="player-loading-card" aria-live="polite">
                <div class="player-loading-media" id="player-loading-media" aria-hidden="true"></div>
                <div class="player-loading-content">
                    <h2 class="player-loading-title">Iniciando a transmissão...</h2>
                </div>
            </div>
            <iframe
                id="camera-player"
                class="player-frame"
                src=""
                title="Câmera ao vivo do condomínio"
                loading="eager"
                referrerpolicy="strict-origin-when-cross-origin"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                allowfullscreen
            ></iframe>
        </section>
        <section class="player-topbar" aria-label="Controles da câmera">
            <div class="player-heading">
                <p class="player-kicker">Ao vivo</p>
                <h1 class="player-title" id="camera-title">Câmera ao vivo</h1>
            </div>
            <div class="player-actions">
                <button class="player-action player-action-primary" type="button" data-fullscreen-target="#camera-player">
                    Tela cheia
                </button>
                <a class="player-action player-action-secondary" href="index.html">Voltar</a>
            </div>
        </section>
    </main>
    <script>
        const cameraConfigs = {
            descendo: {
                title: 'Ladeira abaixo',
                videoId: 'ZXFSWTXopcc',
                iframeTitle: 'Câmera ao vivo ladeira abaixo'
            },
            subindo: {
                title: 'Ladeira acima',
                videoId: 'bAUKHPqeiKs',
                iframeTitle: 'Câmera ao vivo ladeira acima'
            }
        };

        const params = new URLSearchParams(window.location.search);
        const cameraKey = params.get('camera');
        const config = cameraConfigs[cameraKey] || cameraConfigs.descendo;
        const titleEl = document.getElementById('camera-title');
        const iframeEl = document.getElementById('camera-player');
        const loadingCardEl = document.getElementById('player-loading-card');
        const loadingMediaEl = document.getElementById('player-loading-media');
        const loadingMinDurationMs = 1800;
        const loadingStartedAt = Date.now();
        const embedUrl = new URL(`https://www.youtube.com/embed/${config.videoId}`);

        embedUrl.searchParams.set('autoplay', '1');
        embedUrl.searchParams.set('mute', '1');
        embedUrl.searchParams.set('playsinline', '1');
        embedUrl.searchParams.set('rel', '0');

        document.title = `${config.title} | Condomínio Ducado da Toscana`;
        titleEl.textContent = config.title;
        loadingMediaEl.style.backgroundImage = 'url("assets/images/camera-iniciando.webp")';
        iframeEl.src = embedUrl.toString();
        iframeEl.title = config.iframeTitle;

        const hideLoadingCard = () => {
            const elapsed = Date.now() - loadingStartedAt;
            const remaining = Math.max(0, loadingMinDurationMs - elapsed);

            window.setTimeout(() => {
                loadingCardEl.classList.add('player-loading-card-hidden');
            }, remaining);
        };

        iframeEl.addEventListener('load', hideLoadingCard, { once: true });

        document.querySelector('[data-fullscreen-target]')?.addEventListener('click', async (event) => {
            const selector = event.currentTarget.getAttribute('data-fullscreen-target');
            const target = document.querySelector(selector);

            if (!target || typeof target.requestFullscreen !== 'function') {
                return;
            }

            try {
                await target.requestFullscreen();
            } catch (error) {
                console.error('Nao foi possivel abrir em tela cheia.', error);
            }
        });
    </script>
</body>
</html>
